<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt Me</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1>Adopt Me</h1>

        <nav>
            <a href="#">Home</a>
            <a href="#">Pets</a>
            <a href="#">Adoption</a>
            <a href="#">Contact</a>
        </nav>

    </header>

    <section class="hero">

        <h2>Find Your Perfect Pet</h2>

        <p>Give love and care to pets waiting for a home.</p>

        <button onclick="showMessage()">Adopt Now</button>

    </section>

    <section class="pets">

        <h2>Available Pets</h2>

        <div class="card">

            <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?w=400" alt="Dog">

            <h3>Buddy</h3>

            <p>Friendly Golden Retriever</p>

            <button>Adopt</button>

        </div>

        <div class="card">

            <img src="https://images.unsplash.com/photo-1519052537078-e6302a4968d4?w=400" alt="Cat">

            <h3>Luna</h3>

            <p>Cute and playful cat</p>

            <button>Adopt</button>

        </div>

        <div class="card">

            <img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?w=400" alt="Dog">

            <h3>Rocky</h3>

            <p>Energetic and loving puppy</p>

            <button>Adopt</button>

        </div>

    </section>

    <footer>

        <p>© 2026 Adopt Me. All Rights Reserved.</p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
